[build]
  publish = "."

# ─── HEADERS ──────────────────────────────────────────────────────────
# HTML: never cache — we want every visit to pick up the latest links/markup.
# CSS / JS / JSX / images / videos: long cache (we cache-bust via ?v=N or
# changing filenames). Videos additionally need Accept-Ranges so iOS Safari
# can seek without re-downloading the whole file.

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

[[headers]]
  for = "/uploads/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Accept-Ranges = "bytes"

[[headers]]
  for = "/debug/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── SECURITY HEADERS (applied to everything) ─────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
